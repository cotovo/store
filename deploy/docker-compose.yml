services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: faka
      POSTGRES_USER: faka
      POSTGRES_PASSWORD: faka_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faka -d faka"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ../api
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://faka:faka_password@postgres:5432/faka?sslmode=disable
      REDIS_ADDR: redis:6379
      PUBLIC_BASE_URL: http://127.0.0.1:8080
      ADMIN_BASE_URL: http://127.0.0.1:8080/admin
      MOCK_PAY_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../web
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:

